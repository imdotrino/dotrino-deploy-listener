# Exponé el webhook por el dominio existente (TLS ya terminado por nginx).
# Agregá este location al server{} de proxy.dotrino.com / proxy2.dotrino.com.
# GitHub llamará a https://<dominio>/hooks/deploy.

location /hooks/deploy {
    proxy_pass http://127.0.0.1:9099/hooks/deploy;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    # GitHub manda el cuerpo JSON; no hace falta upgrade websocket.
    client_max_body_size 5m;
}
